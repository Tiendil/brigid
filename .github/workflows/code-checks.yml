name: code checks
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  workflow_call:
    inputs:
      branch_ref:
        type: string
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.branch_ref }}
  cancel-in-progress: true

jobs:

  run-dev-checks:
    timeout-minutes: 20
    environment: release
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch_ref }}

      - name: Build containers
        run: docker compose build brigid

      - name: print env
        run: env

      - name: print docker env
        run: ./bin/utils.sh env

      - name: Check code formatting
        run: ./bin/dev-check-formatting.sh

      - name: Check types
        run: ./bin/dev-check-semantics.sh

      - name: Check code spelling
        run: ./bin/dev-check-spelling.sh

      - name: Run tests
        run: ./bin/tests.sh

      - name: Check brigid cli is runnable in prod
        run: ./bin/dev-check-runtime.sh
